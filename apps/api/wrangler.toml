name = "coursewise-api"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Local dev vars live in .dev.vars (gitignored). Production secrets are uploaded
# via `wrangler secret put`. Only non-sensitive vars belong in `[vars]`.
[vars]
JWT_ISSUER = "coursewise"
JWT_AUDIENCE = "coursewise-web"
CORS_ORIGIN = "https://fsuac.com"
R2_BUCKET = "coursewise-files"
EMAIL_FROM = "CourseWise <noreply@fsuac.com>"
# Workers AI model used by the in-app AI chat (material tutor). Llama 3.3 is
# fast and free-allocation friendly; if zh-CN quality disappoints, switch to
# "@cf/qwen/qwen3-30b-a3b-fp8" (multilingual; the service layer already strips
# its <think> blocks).
AI_CHAT_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"

# Required production secrets (uploaded with `wrangler secret put`):
#   DATABASE_URL         — Neon pooled connection string
#   JWT_SECRET           — 32+ byte access-token signing secret
#   JWT_REFRESH_SECRET   — 32+ byte refresh-token signing secret
#
# R2 file uploads (POST /api/files/upload-url). The bucket binding below is
# necessary but NOT sufficient — presigned PUT URLs are signed using the R2
# S3-compatible API, which needs three additional secrets:
#   R2_ACCOUNT_ID        — Cloudflare account id used as the R2 S3 endpoint host
#   R2_ACCESS_KEY_ID     — R2 S3 token access key (for presigned uploads)
#   R2_SECRET_ACCESS_KEY — R2 S3 token secret (for presigned uploads)
# Run `apps/api/scripts/setup-r2.sh` for one-command provisioning.
# Optional:
#   R2_PUBLIC_ENDPOINT   — public CDN host for the R2 bucket (presign falls back to bucket URL when unset)
# AI content generation (Phase 2+; admin UI can be wired up before these exist):
#   AI_GATEWAY_ACCOUNT_ID — Cloudflare account id that owns the AI Gateway
#   AI_GATEWAY_ID         — AI Gateway slug (created in dashboard)
#   AI_GATEWAY_TOKEN      — Only when the gateway has "Authenticated Gateway"
#                           enabled; sent as `cf-aig-authorization: Bearer <token>`
#   ANTHROPIC_API_KEY     — Anthropic API key (referenced by ai_providers.api_key_secret_ref)
#   OPENAI_API_KEY        — OpenAI API key (referenced by ai_providers.api_key_secret_ref)
#   GAMMA_API_KEY        — Gamma Generate API key (https://developers.gamma.app),
#                          required for POST /api/courses/{id}/presentations/gamma
#   CANVAS_TOKEN_ENC_KEY — AES-GCM key (base64, 32 bytes) encrypting teacher
#                          Canvas tokens at rest (lms_connections.token_enc);
#                          required for /api/teacher/canvas/*. Generate with
#                          `openssl rand -base64 32`.
# Outbound email (teacher invitations + future notifications). Uses
# Cloudflare Email Service (beta) via the `[[send_email]]` binding block
# below. When the binding is unset or the sender domain isn't yet verified,
# sends fail and the response's `emailSent` flag is false — the admin UI
# still shows the invite URL for manual sharing. Non-secret default for
# the From: header:
#   EMAIL_FROM           — friendly name + address, e.g.
#                          "CourseWise <noreply@fsuac.com>" (the default).

[observability]
enabled = true

# Two cron triggers (the scheduled() handler in src/index.ts branches on
# controller.cron):
#  - "0 4 * * *"     nightly retention + attendance auto-close + R2/export sweeps
#                    (small UPDATEs/DELETEs by date predicate; low-traffic window).
#  - "*/15 * * * *"  frequent wave-open notification sweep
#                    (jobs/quizScheduleOpenSweep.ts): emails + in-app alerts each
#                    student whose quiz tester schedule has just opened. 15-min
#                    cadence bounds open-notification latency; access itself is
#                    evaluated live at attempt time, so this is convenience only.
[triggers]
crons = ["0 4 * * *", "*/15 * * * *"]

# Workers AI binding for the in-app AI chat (material tutor). No API key and
# no pre-provisioning required; in `wrangler dev` calls proxy to the real
# Cloudflare account (requires a logged-in wrangler), and a missing binding
# degrades to 503 UPSTREAM_UNAVAILABLE at the chat endpoint only.
[ai]
binding = "AI"

[[r2_buckets]]
binding = "COURSE_FILES"
bucket_name = "coursewise-files"
preview_bucket_name = "coursewise-files"

# Workers KV namespace used by the rate-limit middleware. Create the namespace
# with `wrangler kv namespace create RATE_LIMIT_KV` and paste the returned id
# below. In local dev the middleware falls back to an in-memory Map per isolate.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "9192503f091047d7ab16adcbe280f3f2"
preview_id = "f1dab99148d44a3eb565753873d3d36c"

# Cloudflare Workflow that runs AI material generation. The class is exported
# from src/index.ts as `MaterialGenerationWorkflow`. The Workflow API is
# available on Workers paid plans.
[[workflows]]
binding = "MATERIAL_GEN_WORKFLOW"
name = "coursewise-material-gen"
class_name = "MaterialGenerationWorkflow"

# Cloudflare Workflow that builds a teacher course-export ZIP (reading
# materials + gradable items + submissions + scores) into R2 and emails the
# requester an authenticated download link. Class exported from src/index.ts.
[[workflows]]
binding = "COURSE_EXPORT_WORKFLOW"
name = "coursewise-course-export"
class_name = "CourseExportWorkflow"

# Cloudflare Workflow that imports an existing Canvas course into CourseWise
# as drafts (structure + read-only roster reference snapshot; never creates
# student accounts). Class exported from src/index.ts.
[[workflows]]
binding = "LMS_SYNC_WORKFLOW"
name = "coursewise-lms-sync"
class_name = "LmsSyncWorkflow"

# Outbound email binding (teacher invitations + future notifications). Uses
# Cloudflare Email Service (beta) — NOT the older Email Routing send_email
# binding. Email Service supports ARBITRARY recipient addresses once the
# sender domain is verified via DKIM / SPF / MX / DMARC DNS records.
#
# See https://developers.cloudflare.com/email-service/api/send-emails/workers-api/
#
# Operator setup (one-time, in the Cloudflare dashboard):
#   1. Email → Email Service → enable for the account (beta opt-in).
#   2. Add sender domain `fsuac.com` → Cloudflare provides the DNS records:
#         MX     cf-bounce.fsuac.com  →  route1/2/3.mx.cloudflare.net
#         TXT    cf-bounce.fsuac.com  →  "v=spf1 include:_spf.mx.cloudflare.net ~all"
#         TXT    cf-bounce._domainkey.fsuac.com  →  "v=DKIM1; ... p=<key>"
#         TXT    _dmarc.fsuac.com    →  "v=DMARC1; p=reject;"
#   3. Wait for verification ✓ in the dashboard, then redeploy this Worker.
#
# No allowlist on receivers; sends to any well-formed address. The optional
# `allowed_sender_addresses` field below restricts WHO can send (e.g. to
# prevent a compromised Worker from spoofing other addresses on your domain).
[[send_email]]
name = "SEND_EMAIL"
# allowed_sender_addresses = ["noreply@fsuac.com"]
