name = "coursewise-api"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Local dev vars live in .dev.vars (gitignored). Secrets in prod are uploaded via
# `wrangler secret put`. Only non-sensitive vars belong here.
[vars]
JWT_ISSUER = "coursewise"
JWT_AUDIENCE = "coursewise-web"
CORS_ORIGIN = "http://localhost:5173"

# [[d1_databases]]  # configured in M1
# [[kv_namespaces]] # configured later
